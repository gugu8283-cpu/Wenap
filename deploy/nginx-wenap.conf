# 复制到 /etc/nginx/sites-available/wenap
# ln -s ... sites-enabled/wenap && nginx -t && systemctl reload nginx
# 证书: certbot --nginx -d 你的域名

server {
	listen 80;
	server_name wenap.example.com;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl http2;
	server_name wenap.example.com;

	# certbot 会写入 ssl_certificate 路径
	# ssl_certificate /etc/letsencrypt/live/wenap.example.com/fullchain.pem;
	# ssl_certificate_key /etc/letsencrypt/live/wenap.example.com/privkey.pem;

	client_max_body_size 2m;

	location / {
		proxy_pass http://127.0.0.1:3002;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_buffering off;
		proxy_cache off;
		proxy_read_timeout 600s;
		proxy_send_timeout 600s;
	}
}
